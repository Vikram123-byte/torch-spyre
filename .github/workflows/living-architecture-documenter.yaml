# .github/workflows/living-architecture-documenter.yaml
#
# Living Architecture Documenter — CI/CD Loop
# ─────────────────────────────────────────────
# Triggers on every push to main that touches source code or docs.
# The runner script:
#   1. Isolates the git diff for changed source files
#   2. Sends the diff + existing doc context to Granite (watsonx.ai)
#   3. Receives an updated component summary + pre-filled ADR
#   4. Commits the new/updated docs back to docs/source/architecture/adr/
#   5. Pings the Ask-Z ingestion webhook so the vector store updates immediately
#
# Anti-loop protection
# ─────────────────────
# The commit writeback uses `[skip-doc-bot]` in the commit message.
# This workflow skips all runs where that token appears in the HEAD commit
# message, preventing recursive trigger loops entirely.

name: Living Architecture Documenter

on:
  push:
    branches:
      - main
    paths:
      # Only trigger when source code or existing docs change.
      # Writeback commits are excluded via the commit-message guard below.
      - torch_spyre/**/*.py
      - docs/source/**/*.md
      - docs/source/**/*.rst

# Minimal permissions — only what is needed for writeback.
permissions:
  contents: write   # required to push the ADR commit back to the repo

concurrency:
  # Cancel any in-progress run for the same branch so we never have two
  # documenter runs racing to write the same ADR file.
  group: living-arch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  document:
    name: Generate & commit architecture docs
    runs-on: ubuntu-latest

    # ── Anti-loop guard ──────────────────────────────────────────────────────
    # Skip this workflow entirely when the triggering commit was written by the
    # documenter itself (identified by [skip-doc-bot] in the commit message).
    if: |
      !contains(github.event.head_commit.message, '[skip-doc-bot]')

    steps:
      # ── 1. Checkout with full history ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the last 2 commits so we can diff HEAD against HEAD~1.
          fetch-depth: 2
          # Use the GITHUB_TOKEN so the subsequent push step is authorised.
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --quiet httpx tenacity

      # ── 4. Configure git identity for the writeback commit ───────────────
      - name: Configure git bot identity
        run: |
          git config user.name  "ask-z-doc-bot"
          git config user.email "ask-z-doc-bot@users.noreply.github.com"

      # ── 5. Run the documenter script ─────────────────────────────────────
      - name: Run Living Architecture Documenter
        id: documenter
        env:
          # watsonx.ai credentials — stored as GitHub Actions secrets.
          # See: repository Settings → Secrets and variables → Actions
          WATSONX_API_KEY: ${{ secrets.WATSONX_API_KEY }}
          WATSONX_PROJECT_ID: ${{ secrets.WATSONX_PROJECT_ID }}
          WATSONX_API_URL: ${{ secrets.WATSONX_API_URL }}
          WATSONX_API_VERSION: '2024-09-01'
          GENERATION_MODEL: ibm/granite-4-h-small

          # Ask-Z ingestion webhook — optional; left blank if not yet deployed.
          # Format: https://<your-ask-z-host>/api/v1/ingest/webhook
          ASKZ_INGEST_WEBHOOK: ${{ secrets.ASKZ_INGEST_WEBHOOK }}

          # GitHub context used to construct source URLs in the ADR.
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python ask_z/scripts/living_arch_documenter.py

      # ── 6. Commit and push the generated docs ────────────────────────────
      - name: Commit and push generated ADRs
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Stage only the ADR output directory.
          git add docs/source/architecture/adr/

          # Exit cleanly if nothing changed (idempotent — no new docs needed).
          if git diff --staged --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi

          # Commit with the anti-loop token so this workflow skips itself.
          git commit -m "docs(adr): auto-update architecture docs [skip-doc-bot]

          Generated by Living Architecture Documenter for commit ${{ github.sha }}.
          Source: $COMMIT_MSG"

          git push origin main
